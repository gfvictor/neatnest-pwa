<div class="container-container">
  <app-header></app-header>

  <div *ngIf="isLoading">
    <p>Carregando...</p>
  </div>

  <div class="content-container" *ngIf="!isLoading" @fadeInOut>
    <div *ngIf="container?.image">
      <img ngSrc="{{ container?.image }}" alt="Container image" width="180" height="180" />
    </div>

    <h1 class="page-title">{{ container?.name }} {{ container?.number }}</h1>

    <h2 class="page-subtitle">
      Objetos listados: <span class="page-quantity" @fadeInOut>{{ objects.length }}</span>
    </h2>

    <ng-container *ngIf="!isLoading && objects.length === 0" @fadeInOut>
      <p>Nenhum objeto encontrado.</p>
    </ng-container>

    <div class="page-list container-list">
      <div class="objects-table">
        <div class="table-header">
          <div>Nome</div>
          <div>Quantidade</div>
        </div>

        <div class="table-body">
          <div
            class="table-row"
            *ngFor="let obj of objects; let i = index"
            (click)="router.navigate(['/object', obj.id])"
            [class.even]="i % 2 === 0"
            [@fadeInOut]
          >
            <div class="cell-name">
              {{ obj.name }}
            </div>
            <div class="cell-quantity">{{ obj.quantity }}</div>
            <div class="actions-menu">
              <button
                class="btn-menu-toggle"
                type="button"
                (click)="$event.stopPropagation(); toggleMenu(obj.id)"
                [class.active]="activeMenuId === obj.id"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <circle cx="12" cy="5" r="2" />
                  <circle cx="12" cy="12" r="2" />
                  <circle cx="12" cy="19" r="2" />
                </svg>
              </button>

              <div
                class="menu-dropdown"
                *ngIf="activeMenuId === obj.id"
                (click)="$event.stopPropagation()"
              >
                <button class="btn-edit" (click)="goToEditObject(obj.id)">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>

                <button class="btn-delete" (click)="deleteObject(obj.id, obj.name)">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"></path>
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <form class="page-form" (ngSubmit)="createObject()">
    <div class="page-form-input split-container">
      <input
        type="text"
        id="objName"
        [(ngModel)]="newObjName"
        name="objName"
        placeholder="Nome do novo objeto"
        required
      />

      <input
        type="number"
        id="objQuantity"
        [(ngModel)]="newObjQuantity"
        name="objQuantity"
        min="1"
        placeholder="Quantidade"
        required
      />
    </div>

    <button type="submit" [disabled]="isCreating || !newObjName.trim()">
      {{ isLoading || isCreating ? "Carregando..." : "Adicionar" }}
    </button>
  </form>

  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div>
    <button class="btn-back" type="button" (click)="backToRoom()" [disabled]="isLoading">
      {{ isLoading ? "Carregando..." : "Voltar" }}
    </button>
  </div>

  <app-arrows></app-arrows>
  <app-footer></app-footer>
</div>
