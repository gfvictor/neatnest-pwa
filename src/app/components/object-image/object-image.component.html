<div class="image-section">
  <div class="image-wrapper">
    <img
      *ngIf="object.image"
      [src]="object.image"
      [alt]="object.name"
      class="object-image"
      (click)="openCamera()"
    />

    <div *ngIf="!object.image" class="placeholder" (click)="openCamera()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <rect x="3" y="3" width="18" height="18" rx="4" />
        <circle cx="9" cy="9" r="2" />
        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
      </svg>
      <span>Toque para tirar foto</span>
    </div>

    <div class="image-actions" *ngIf="object.image">
      <button
        class="btn-camera"
        (click)="openCamera(); $event.stopPropagation()"
        title="Tirar nova foto"
      >
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M14.5 2.5h-5A2.5 2.5 0 0 0 7 5v14A2.5 2.5 0 0 0 9.5 21.5h5a2.5 2.5 0 0 0 2.5-2.5V5a2.5 2.5 0 0 0-2.5-2.5z"
          />
        </svg>
      </button>

      <button class="btn-delete" (click)="deleteImage(); $event.stopPropagation()" title="Remover">
        <svg viewBox="0 0 24 24">
          <path
            d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m-8 0h10l-1 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L6 6Z"
          />
        </svg>
      </button>
    </div>

    <div class="gallery-hint" *ngIf="!object.image">
      <small
        >ou
        <a href="javascript:void(0)" (click)="openGallery(); $event.stopPropagation()"
          >escolher da galeria</a
        ></small
      >
    </div>

    <div class="upload-progress" *ngIf="isUploading">Enviando foto...</div>
  </div>

  <input
    #cameraInput
    type="file"
    accept="image/*"
    capture="environment"
    (change)="onFileSelected($event)"
    hidden
  />

  <input #galleryInput type="file" accept="image/*" (change)="onFileSelected($event)" hidden />
</div>
