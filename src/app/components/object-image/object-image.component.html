<div class="image-section">
  <div class="image-wrapper">
    <div *ngIf="!object.image" class="stock-icon" (click)="openCamera()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" width="100%" height="100%">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
    </div>

    <img
      *ngIf="object.image"
      [src]="object.image"
      [alt]="object.image"
      class="object-image"
      (click)="openCameraWithAlert()"
    />

    <div class="image-actions" *ngIf="object.image">
      <button
        class="btn-image-action delete"
        (click)="deleteImage(); $event.stopPropagation()"
        title="Remover Imagem"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18"></path>
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"></path>
          <path d="M10 11v6"></path>
          <path d="M14 11v6"></path>
        </svg>
      </button>
    </div>

    <div class="upload-progress" *ngIf="isUploading">Enviando Imagem...</div>
  </div>

  <input #cameraInput type="file" accept="image/*" capture="environment"
  (change)="onFileSelected($event)" hidden />
  <input #galleryInput type="file" accept="image/*" (change)="onFileSelected($event)" hidden
  />
</div>
