<div class="object-container" @fadeInOut>
  <app-logo></app-logo>

  <div *ngIf="isLoading">
    <p>Carregando...</p>
  </div>

  <div class="content-container" *ngIf="!isLoading" @fadeInOut>
    <div *ngIf="object?.image">
      <img ngSrc="{{ object?.image }}" alt="Object image" width="180" height="180" />
    </div>

    <div class="object-card" *ngIf="!isLoading && object" @fadeInOut>
      <div class="image-section">
        <img
          *ngIf="object.image; else stockIcon"
          [src]="object.image"
          [alt]="object.name"
          class="object-image"
        />
        <ng-template #stockIcon>
          <div class="stock-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.75">
              <rect x="3" y="3" width="18" height="18" rx="4" />
              <circle cx="9" cy="9" r="2" />
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
            </svg>
          </div>
        </ng-template>
      </div>

      <div class="info-section">
        <h1 class="object-name">{{ object.name }}</h1>

        <div class="info-row">
          <span class="label">Quantidade: </span>
          <span class="value">{{ object.quantity }}</span>
        </div>

        <div class="info-row">
          <span class="label">Container: </span>
          <span class="value">{{ containerName || "—" }}</span>
        </div>

        <div class="info-row">
          <span class="label">Cômodo: </span>
          <span class="value">{{ roomName || "—" }}</span>
        </div>
      </div>
    </div>
  </div>

  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div>
    <button class="btn-back" type="button" (click)="goBack()" disabled>
      {{ isLoading ? "Carregando..." : "Adicionar Imagem" }}
    </button>
  </div>

  <div>
    <button class="btn-back" type="button" (click)="goBack()" [disabled]="isLoading">
      {{ isLoading ? "Carregando..." : "Voltar" }}
    </button>
  </div>

  <app-arrows></app-arrows>
  <app-footer></app-footer>
</div>
