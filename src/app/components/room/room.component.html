<div class="room-container">
  <app-logo></app-logo>

  <div class="content-container">
    <h1 class="room-title" *ngIf="room">{{ room.name }}</h1>

    <h2 class="room-subtitle">
      Containers listados: <span class="room-quantity">{{ containers.length }}</span>
    </h2>

    <ng-container *ngIf="!isLoading && containers.length === 0">
      <p>Nenhum container encontrado.</p>
    </ng-container>

    <div class="room-list-container">
      <ul class="room-list">
        <li class="room-list-items" *ngFor="let c of containers">
          <button class="btn-room-list" type="button" (click)="openContainer(c)">
            <span class="list item">{{ c.name }} {{ c.number }}</span>
          </button>
          <button class="btn-delete" type="button" (click)="deleteContainer(c.id)">X</button>
        </li>
      </ul>

      <div class="scroll-indicator" *ngIf="containers.length > 4"></div>
    </div>
  </div>

  <form class="room-form" (ngSubmit)="createContainer()">
    <div class="room-form-input">
      <label for="containerName">Nome do novo container</label>
      <input
        id="containerName"
        type="text"
        [(ngModel)]="newContainerName"
        name="containerName"
        required
      />

      <label for="containerNumber">Número</label>
      <input
        id="containerNumber"
        type="number"
        [(ngModel)]="newContainerNumber"
        name="containerNumber"
        required
        min="0"
        step="1"
      />
    </div>

    <button type="submit" [disabled]="isLoading || !newContainerName.trim()">
      {{ isLoading ? "Carregando..." : "Adicionar" }}
    </button>
  </form>

  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div>
    <button class="btn-back" type="button" (click)="backToHousehold()" [disabled]="isLoading">
      {{ isLoading ? "Carregando..." : "Voltar" }}
    </button>
  </div>

  <app-arrows></app-arrows>
  <app-footer></app-footer>
</div>
