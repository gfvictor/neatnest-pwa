<div class="room-container">
  <app-header></app-header>

  <div *ngIf="isLoading">
    <p>Carregando...</p>
  </div>

  <div class="content-container" *ngIf="!isLoading" @fadeInOut>
    <h1 class="page-title" *ngIf="room">{{ room.name }}</h1>

    <h2 class="page-subtitle">
      Containers listados: <span class="page-quantity">{{ containers.length }}</span>
    </h2>

    <div *ngIf="!isLoading && containers.length === 0" @fadeInOut>
      <p>Nenhum container encontrado.</p>
    </div>

    <div class="page-list-container" *ngIf="!isLoading" @fadeInOut>
      <ul class="page-list">
        <li class="page-list-items" *ngFor="let c of containers">
          <button class="btn-room-list" type="button" (click)="openContainer(c)">
            <span class="list item">{{ c.name }} {{ c.number }}</span>
            <div class="actions-menu">
              <button
                class="btn-menu-toggle"
                type="button"
                (click)="$event.stopPropagation(); toggleMenu(c.id)"
                [class.active]="activeMenuId === c.id"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <circle cx="12" cy="5" r="2" />
                  <circle cx="12" cy="12" r="2" />
                  <circle cx="12" cy="19" r="2" />
                </svg>
              </button>

              <div
                class="menu-dropdown"
                *ngIf="activeMenuId === c.id"
                (click)="$event.stopPropagation()"
              >
                <button class="btn-edit" (click)="goToEditContainer(c.id)">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>

                <button class="btn-delete" (click)="deleteContainer(c.id, c.name)">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"></path>
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          </button>
        </li>
      </ul>

      <div class="scroll-indicator" *ngIf="containers.length > 4"></div>
    </div>
  </div>

  <form class="page-form" (ngSubmit)="createContainer()">
    <div class="page-form-input split-container">
      <input
        id="containerName"
        type="text"
        [(ngModel)]="newContainerName"
        name="containerName"
        placeholder="Nome do novo container"
        required
      />

      <input
        id="containerNumber"
        type="number"
        [(ngModel)]="newContainerNumber"
        name="containerNumber"
        placeholder="Número"
        required
        min="0"
        step="1"
      />
    </div>

    <button type="submit" [disabled]="isLoading || !newContainerName.trim()">
      {{ isLoading ? "Carregando..." : "Adicionar" }}
    </button>
  </form>

  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div>
    <button class="btn-back" type="button" (click)="backToHousehold()" [disabled]="isLoading">
      {{ isLoading ? "Carregando..." : "Voltar" }}
    </button>
  </div>

  <app-arrows></app-arrows>
  <app-footer></app-footer>
</div>
