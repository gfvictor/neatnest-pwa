<div class="household-container" @fadeInOut>
  <app-logo></app-logo>

  <div *ngIf="isLoading">
    <p>Carregando...</p>
  </div>

  <div class="content-container" *ngIf="!isLoading" @fadeInOut>
    <h1 class="page-title">Casa</h1>

    <h2 class="page-subtitle" *ngIf="!isLoading" @fadeInOut>
      Cômodos listados: <span class="page-quantity">{{ rooms.length }}</span>
    </h2>

    <ng-container *ngIf="!isLoading && rooms.length === 0" @fadeInOut>
      <p>Nenhum cômodo encontrado.</p>
    </ng-container>

    <div class="page-list-container" *ngIf="!isLoading" @fadeInOut>
      <ul class="page-list" *ngIf="!isLoading" @fadeInOut>
        <li class="page-list-items" *ngFor="let r of rooms">
          <button class="btn-household-list" type="button" (click)="openRoom(r)">
            <span class="list-item">{{ r.name }}</span>
            <div class="actions-menu">
              <button
                class="btn-menu-toggle"
                type="button"
                (click)="$event.stopPropagation(); toggleMenu(r.id)"
                [class.active]="activeMenuId === r.id"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <circle cx="12" cy="5" r="2" />
                  <circle cx="12" cy="12" r="2" />
                  <circle cx="12" cy="19" r="2" />
                </svg>
              </button>

              <div
                class="menu-dropdown"
                *ngIf="activeMenuId === r.id"
                (click)="$event.stopPropagation()"
              >
                <button class="btn-delete" (click)="deleteRoom(r.id, r.name)">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M3 6h18"></path>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <path d="M5 6v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6"></path>
                    <path d="M10 11v6"></path>
                    <path d="M14 11v6"></path>
                  </svg>
                </button>
              </div>
            </div>
          </button>
        </li>
      </ul>

      <div class="scroll-indicator" *ngIf="rooms.length > 6"></div>
    </div>
  </div>

  <form class="page-form" (ngSubmit)="createRoom()">
    <div class="page-form-input">
      <input
        id="roomName"
        type="text"
        [(ngModel)]="newRoomName"
        name="roomName"
        placeholder="Nome do novo cômodo"
        required
      />
    </div>

    <button type="submit" [disabled]="isLoading || !newRoomName.trim()">
      {{ isLoading ? "Carregando..." : "Adicionar" }}
    </button>
  </form>

  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div>
    <button class="btn-back" type="button" (click)="goBack()" [disabled]="isLoading">
      {{ isLoading ? "Carregando..." : "Voltar" }}
    </button>
  </div>

  <app-arrows></app-arrows>
  <app-footer></app-footer>
</div>
