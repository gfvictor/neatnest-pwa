<div class="household-container" @fadeInOut>
  <app-logo></app-logo>

  <div class="content-container">
    <h1 class="household-title">Casa</h1>

    <h2 class="household-subtitle">
      Cômodos listados: <span class="household-quantity">{{ rooms.length }}</span>
    </h2>

    <ng-container *ngIf="!isLoading && rooms.length === 0">
      <p>Nenhum cômodo encontrado.</p>
    </ng-container>

    <div class="household-list-container">
      <ul class="household-list" *ngIf="!isLoading" @fadeInOut>
        <li class="household-list-items" *ngFor="let r of rooms">
          <button class="btn-household-list" type="button" (click)="openRoom(r)">
            <span class="list-item">{{ r.name }}</span>
          </button>
          <button class="btn-delete" type="button" (click)="deleteRoom(r.id)">x</button>
        </li>
      </ul>

      <div class="scroll-indicator" *ngIf="rooms.length > 6"></div>
    </div>
  </div>

  <form class="household-form" (ngSubmit)="createRoom()">
    <label for="roomName">Nome do novo cômodo</label>
    <input id="roomName" type="text" [(ngModel)]="newRoomName" name="roomName" required />

    <button type="submit" [disabled]="isLoading || !newRoomName.trim()">
      {{ isLoading ? "Carregando..." : "Adicionar" }}
    </button>
  </form>

  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div>
    <button class="btn-back" type="button" (click)="goBack()" [disabled]="isLoading">
      {{ isLoading ? "Carregando..." : "Voltar" }}
    </button>
  </div>

  <app-arrows></app-arrows>
  <app-footer></app-footer>
</div>
